<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <meta name="theme-color" content="#000000" />
    <meta name="robots" content="noindex" />
    <title>*(It's a red guitar.)</title>

    <style>
      body {
        margin: 0;
      }

      #center {
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .dess {
        min-width: 320px;
        max-width: 100%;
        min-height: 320px;
        max-height: 100%;
        position: relative;
        cursor: pointer;
      }

      .dess img {
        position: absolute;
        height: 100%;
        width: 100%;
        object-fit: contain;
        image-rendering: pixelated;
        user-select: none;
        pointer-events: none;
      }
    </style>
  </head>

  <body>
    <main>
      <div id="center">
        <div class="dess" id="dess">
          <img src="/guitar.gif" alt="Red guitar" />
        </div>
      </div>

      <!-- Native audio (MP3 only) -->
      <audio id="audio" src="/findher.mp3" loop preload="auto"></audio>

      <script>
        const dess = document.getElementById('dess');
        const audio = document.getElementById('audio');

        let playing = false;

        dess.addEventListener('click', () => {
          if (!playing) {
            audio.volume = 0.5;
            audio.play();
            playing = true;
          } else {
            audio.pause();
            audio.currentTime = 0;
            playing = false;
          }
        });
      </script>
    </main>
  </body>
</html>
