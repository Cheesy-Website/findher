<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <meta name="theme-color" content="#000000" />
    <meta name="robots" content="noindex" />
    <title>*(It's a red guitar.)</title>
    <link rel="stylesheet" href="/extra.css" />
  </head>

  <body>
    <main>
      <div id="center">
        <div class="dess" id="dess">
          <img src="/guitar.gif" alt="Red guitar" />
        </div>
      </div>

      <style>
        .dess {
          min-width: 320px;
          max-width: 100%;
          min-height: 320px;
          max-height: 100%;
          position: relative;
          color: black;
          cursor: pointer;
        }

        .dess img {
          position: absolute;
          height: 100%;
          width: 100%;
          object-fit: contain;
          image-rendering: pixelated;
        }
      </style>

      <!-- Native audio -->
      <audio id="audio" src="/findher.mp3" loop preload="auto"></audio>

      <script>
        const dess = document.getElementById('dess');
        const audio = document.getElementById('audio');

        dess.addEventListener('click', () => {
          if (!dess.classList.contains('playing')) {
            audio.volume = 0.5;
            audio.play();
            dess.classList.add('playing');
          } else {
            audio.pause();
            audio.currentTime = 0;
            dess.classList.remove('playing');
          }
        });
      </script>
    </main>
  </body>
</html>
